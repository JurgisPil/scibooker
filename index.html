<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SciBooker - Instrument Booking Platform</title>
    <meta name="description" content="Premium instrument booking platform supporting subcalendars and multiple users.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css?v=2" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css?v=3">
    <link rel="stylesheet" href="styles/components.css?v=3">
    <link rel="stylesheet" href="styles/calendar.css?v=3">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo" style="padding: var(--spacing-md) var(--spacing-md);">
                <img src="images/logo.png" alt="SciBooker Logo" style="width: 100%; max-height: 120px; object-fit: contain; display: block;">
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item" data-view="dashboard">
                    <i class="ri-dashboard-line"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-view="my-bookings">
                    <i class="ri-calendar-todo-line"></i> My Bookings
                </a>
                <a href="#" class="nav-item" id="nav-admin" data-view="admin-panel" style="display: none;">
                    <i class="ri-settings-3-line"></i> Admin Panel
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar" id="current-user-avatar">JS</div>
                <div class="user-info" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div>
                        <div class="name" id="current-user-name">Loading...</div>
                        <div class="role" id="current-user-role">User</div>
                    </div>
                    <button class="icon-btn" id="btn-logout" title="Log Out" style="color: var(--danger);">
                        <i class="ri-logout-box-r-line"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" id="global-search-input" placeholder="Search instruments...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn"><i class="ri-notification-3-line"></i></button>
                    <button class="btn-primary" id="btn-new-booking">
                        <i class="ri-add-line"></i> New Booking
                    </button>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Content will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New Booking</h2>
                <button class="icon-btn close-modal"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="booking-form">
                    <input type="hidden" id="editing-booking-id" value="">
                    <div class="form-group">
                        <label for="instrument-select">Instrument</label>
                        <select id="instrument-select" required></select>
                        <div id="instrument-display" style="display: none; padding: 0.5rem; background: var(--bg-surface-elevated); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-primary); font-weight: 500;"></div>
                    </div>
                    <div class="form-group">
                        <label>Channels (Select one or more)</label>
                        <div id="channel-checkbox-group" class="checkbox-group" style="max-height: 150px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; padding: 0.5rem; background: var(--bg-background); border: 1px solid var(--glass-border); border-radius: var(--radius-sm);">
                            <div style="color: var(--text-muted); font-size: 0.85rem; grid-column: 1 / -1;">Select an instrument first</div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="booking-start-date">Start Date</label>
                            <input type="date" id="booking-start-date" required>
                        </div>
                        <div class="form-group">
                            <label for="booking-start-time">Start Time</label>
                            <input type="time" id="booking-start-time" value="09:00" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="booking-end-date">End Date</label>
                            <input type="date" id="booking-end-date" required>
                        </div>
                        <div class="form-group">
                            <label for="booking-end-time">End Time</label>
                            <input type="time" id="booking-end-time" value="17:00" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="booking-purpose">Purpose / Notes</label>
                        <textarea id="booking-purpose" rows="3"></textarea>
                    </div>
                </form>
                <div class="form-actions" style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--spacing-lg);">
                    <button type="button" id="btn-modal-delete" class="btn-secondary" style="color: var(--danger, #ef4444); border-color: var(--danger, #ef4444); display: none;">Delete</button>
                    <div style="display: flex; gap: var(--spacing-sm); margin-left: auto;">
                        <button type="button" class="btn-secondary close-modal">Cancel</button>
                        <button type="submit" form="booking-form" class="btn-primary" id="btn-modal-submit">Confirm Booking</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Instrument Modal -->
    <div id="edit-instrument-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Instrument</h2>
                <button class="icon-btn close-edit-modal"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-edit-instrument">
                    <input type="hidden" id="edit-inst-id" value="">
                    <div class="form-group">
                        <label>Instrument Name</label>
                        <input type="text" id="edit-inst-name" required>
                    </div>
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <input type="text" id="edit-inst-desc">
                    </div>
                    <div style="display: flex; gap: var(--spacing-md);">
                        <div class="form-group" style="flex: 1;">
                            <label>Channel Prefix</label>
                            <input type="text" id="edit-inst-prefix" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Number of Channels</label>
                            <input type="number" id="edit-inst-count" required min="1" max="128">
                        </div>
                    </div>
                </form>
                <div class="form-actions" style="display: flex; justify-content: flex-end; align-items: center; margin-top: var(--spacing-lg);">
                    <div style="display: flex; gap: var(--spacing-sm);">
                        <button type="button" class="btn-secondary close-edit-modal">Cancel</button>
                        <button type="submit" form="form-edit-instrument" class="btn-primary">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="edit-user-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit User</h2>
                <button class="icon-btn close-edit-user-modal"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-edit-user">
                    <input type="hidden" id="edit-user-id" value="">
                    <div style="display: flex; gap: var(--spacing-md);">
                        <div class="form-group" style="flex: 2;">
                            <label>User Name</label>
                            <input type="text" id="edit-user-name" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Role</label>
                            <select id="edit-user-role" required>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: var(--spacing-md);">
                        <div class="form-group" style="flex: 1;">
                            <label>Email</label>
                            <input type="email" id="edit-user-email">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Phone</label>
                            <input type="text" id="edit-user-phone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Other Info</label>
                        <input type="text" id="edit-user-other">
                    </div>
                </form>
                <div class="form-actions" style="display: flex; justify-content: flex-end; align-items: center; margin-top: var(--spacing-lg);">
                    <div style="display: flex; gap: var(--spacing-sm);">
                        <button type="button" class="btn-secondary close-edit-user-modal">Cancel</button>
                        <button type="submit" form="form-edit-user" class="btn-primary">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/data.js?v=12"></script>
    <script type="module" src="js/components.js?v=12"></script>
    <script type="module" src="js/app.js?v=12"></script>

    <!-- Auth Overlay -->
    <div class="modal-overlay" id="auth-overlay" style="display: flex; background: var(--bg-base); z-index: 9999;">
        <div class="modal-content" style="max-width: 400px; width: 100%; text-align: center;">
            <div class="logo" style="justify-content: center; margin-bottom: var(--spacing-xl);">
                <img src="images/logo.png" alt="SciBooker Logo" style="height: 60px; object-fit: contain;">
            </div>
            <h2>Welcome to SciBooker</h2>
            <p style="color: var(--text-muted); margin-bottom: var(--spacing-lg);">Please sign in to continue</p>
            
            <div id="auth-actions" style="text-align: center;">
                <div id="auth-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: var(--spacing-md); display: none;"></div>
                
                <button type="button" class="btn-primary" id="btn-google-signin" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Sign in with Google
                </button>
            </div>
        </div>
    </div>

</body>
</html>
